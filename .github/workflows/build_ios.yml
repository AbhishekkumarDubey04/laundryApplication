name: Build iOS Application

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build:
    name: Build iOS Unsigned Bundle
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd mobile
          flutter pub get

      # Build the unsigned iOS app bundle for physical devices (iphoneos target)
      # The dummy DEVELOPMENT_TEAM in the project configurations satisfies Xcode requirements
      - name: Build iOS App (Unsigned)
        run: |
          cd mobile
          flutter build ios --no-codesign --release

      # Package the app into a standard iOS IPA format (Payload/Runner.app zipped to Runner.ipa)
      - name: Package IPA
        run: |
          cd mobile/build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r Runner.ipa Payload

      # Upload the IPA file as a download link in GitHub Actions
      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-ipa
          path: mobile/build/ios/iphoneos/Runner.ipa
