name: Build iOS Application

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build:
    name: Build iOS Unsigned Bundle
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd mobile
          flutter pub get

      # To build a fully signed .ipa for App Store or TestFlight, code signing is required.
      # Since code signing certificates and provisioning profiles are private,
      # this workflow builds an unsigned iOS bundle (.app) by default.
      # To add code signing, see instructions at: https://docs.flutter.dev/deployment/cd
      - name: Build iOS App (Unsigned)
        run: |
          cd mobile
          flutter build ios --no-codesign --release

      # Compress Runner.app into a zip file so it can be uploaded as an artifact
      - name: Compress Runner.app
        run: |
          cd mobile/build/ios/iphoneos
          zip -r Runner.app.zip Runner.app

      # Upload the zip file as a download link in GitHub Actions
      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: mobile/build/ios/iphoneos/Runner.app.zip
