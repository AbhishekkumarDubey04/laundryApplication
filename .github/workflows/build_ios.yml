name: Build iOS Application

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build:
    name: Build iOS Unsigned Bundle
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd mobile
          flutter pub get

      # Building for physical iOS devices requires a paid Apple Developer Account/Team.
      # To check compilation and allow testing on iOS Simulators without credentials,
      # we compile for the simulator target instead of the physical device target.
      - name: Build iOS App (Simulator)
        run: |
          cd mobile
          flutter build ios --simulator

      # Compress Runner.app into a zip file so it can be uploaded as an artifact
      - name: Compress Runner.app
        run: |
          cd mobile/build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app

      # Upload the zip file as a download link in GitHub Actions
      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: mobile/build/ios/iphonesimulator/Runner.app.zip
