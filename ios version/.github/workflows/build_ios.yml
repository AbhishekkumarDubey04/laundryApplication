name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Also allows manual "Run workflow" button in GitHub UI

# Cancel any in-progress build if a new push happens
concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Flutter iOS Build
    runs-on: macos-latest   # GitHub free macOS runner (Apple Silicon M1)
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Flutter (pinned to your exact version) ───────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'   # Latest stable; matches your SDK constraint
          channel: 'stable'
          cache: true                  # Caches Flutter SDK between runs

      - name: Print Flutter & Dart version
        run: |
          flutter --version
          dart --version

      # ── 3. Cache pub packages ─────────────────────────────────────────────────
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ── 4. Install Dart/Flutter dependencies ──────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 5. Run Flutter analyzer (catches code errors before wasting build time)
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: false

      # ── 6. Cache CocoaPods (speeds up pod install from ~4 min to ~30 sec) ─────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      # ── 7. Install CocoaPods dependencies ─────────────────────────────────────
      - name: Install CocoaPods
        working-directory: ios
        run: |
          pod install --repo-update

      # ── 8. Build the Flutter iOS app (no code signing) ────────────────────────
      #    This compiles all Dart code and Flutter framework into an iOS .app
      - name: Build Flutter iOS release
        run: |
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      # ── 9. Package .app → .ipa using xcodebuild ───────────────────────────────
      #    A bare .app cannot be installed — it must be archived into an IPA.
      #    We create the archive structure manually since we have no signing cert.
      - name: Package .app into unsigned IPA
        run: |
          # Create the Payload folder structure that IPA format requires
          mkdir -p build/ios/ipa/Payload

          # Copy the compiled .app into Payload/
          cp -r "build/ios/iphoneos/Runner.app" "build/ios/ipa/Payload/Runner.app"

          # Zip it as a .ipa (IPA is just a renamed zip with Payload/ inside)
          cd build/ios/ipa
          zip -r LaundryIndia.ipa Payload/
          echo "✅ IPA created: $(du -sh LaundryIndia.ipa)"

      # ── 10. Upload IPA as a downloadable GitHub artifact ──────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaundryIndia-iOS-${{ github.run_number }}
          path: build/ios/ipa/LaundryIndia.ipa
          if-no-files-found: error      # Fail loudly if IPA wasn't produced
          retention-days: 14            # Keep for 2 weeks

      # ── 11. Also upload dSYM for crash reporting (optional but useful) ─────────
      - name: Upload debug symbols (dSYM)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LaundryIndia-dSYM-${{ github.run_number }}
          path: build/ios/archive/Runner.xcarchive/dSYMs/
          if-no-files-found: warn
          retention-days: 14

      # ── 12. Print build summary ───────────────────────────────────────────────
      - name: Build summary
        if: success()
        run: |
          echo "## ✅ iOS Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| App Name | LaundryIndia |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | 1.0.0+${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the IPA from the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 Install Options" >> $GITHUB_STEP_SUMMARY
          echo "- **Sideloadly** (Windows): https://sideloadly.io — drag & drop the IPA" >> $GITHUB_STEP_SUMMARY
          echo "- **AltStore** (Windows): https://altstore.io" >> $GITHUB_STEP_SUMMARY
          IPA_SIZE=$(du -sh build/ios/ipa/LaundryIndia.ipa | cut -f1)
          echo "- **IPA Size**: $IPA_SIZE" >> $GITHUB_STEP_SUMMARY

  # ── Notification job (runs even if build fails) ──────────────────────────────
  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: build-ios
    if: failure()
    steps:
      - name: Print failure notice
        run: |
          echo "## ❌ iOS Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the build logs above for errors." >> $GITHUB_STEP_SUMMARY
          echo "Common fixes:" >> $GITHUB_STEP_SUMMARY
          echo "- Run \`flutter pub get\` locally first" >> $GITHUB_STEP_SUMMARY
          echo "- Check pubspec.yaml dependency versions" >> $GITHUB_STEP_SUMMARY
          echo "- Check ios/Podfile for compatibility" >> $GITHUB_STEP_SUMMARY
